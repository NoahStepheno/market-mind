services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "6543:5432"
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-market}:${POSTGRES_PASSWORD:-market}@postgres:5432/${POSTGRES_DB:-market}
      REDIS_URL: redis://redis:6379

  mock-datasource:
    build:
      context: .
      dockerfile: apps/datasource/Dockerfile
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
